spring:
  application:
    name: mini-corebanking
  profiles:
    include: secret
  datasource:
    url: jdbc:mysql://localhost:3306/minibank?serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug